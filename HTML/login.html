<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="/CSS/login.css" />
  </head>
  <body>
    <div class="login-page">
      <div class="left-sec">
        <img
          src="https://static.xx.fbcdn.net/rsrc.php/yb/r/HpEiFYDux5j.webp"
          alt="img"
        />
        <p>
          Explore<br />
          the things<br />
          <span> you love</span>.
        </p>
      </div>
      <div class="right-sec">
        <h5>Log In to Facebook</h5>
        <input
          type="text"
          id="email"
          placeholder="Email address or phone number"
        />
        <input type="password" id="password" placeholder="Password" />
        <button class="login-btn">Log in</button>
        <button class="forgot-btn">Forgotten password?</button>
        <button class="create-btn">
          <a href="/HTML/signup.html">Create new account</a>
        </button>
        <img
          src="https://static.xx.fbcdn.net/rsrc.php/y1/r/4hZ1LkFP2sW.webp"
          alt="logo"
          class="logo"
        />
      </div>
    </div>
  </body>
</html>
